<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Séance Muscu</title>
  <style>
    :root {
      --bg: #eeedf5;
      --surface: #ffffff;
      --surface2: #f4f3fb;
      --violet: #6d5ff6;
      --violet-light: #ebe9ff;
      --teal: #0d9488;
      --teal-light: #ccfbf1;
      --rose: #e11d48;
      --rose-light: #ffe4e6;
      --text: #1c1b3a;
      --text2: #4b4873;
      --muted: #9896b8;
      --border: #e2dff5;
      --shadow-sm: 0 1px 3px rgba(80,70,160,.07), 0 2px 8px rgba(80,70,160,.05);
      --shadow: 0 2px 8px rgba(80,70,160,.08), 0 8px 24px rgba(80,70,160,.06);
      --shadow-lg: 0 4px 16px rgba(80,70,160,.12), 0 12px 40px rgba(80,70,160,.08);
      --r: 18px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100dvh;
    }

    #app {
      max-width: 430px;
      margin: 0 auto;
      padding: 28px 16px 56px;
      display: flex;
      flex-direction: column;
    }

    /* Phase bar */
    .phase-bar { display: flex; gap: 6px; margin-bottom: 32px; }
    .pd { flex: 1; height: 4px; border-radius: 2px; background: var(--border); transition: background .4s; }
    .pd-active { background: var(--violet); }
    .pd-done   { background: var(--teal); }

    /* Typography */
    .big-emoji { font-size: 3.5rem; text-align: center; margin-bottom: 14px; }
    h1 { font-size: 2rem; font-weight: 800; margin-bottom: 6px; line-height: 1.15; color: var(--text); letter-spacing: -.02em; }
    h2 { font-size: 0.78rem; font-weight: 700; margin-bottom: 14px; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; }
    .sub { color: var(--text2); font-size: 0.95rem; margin-bottom: 24px; line-height: 1.6; }

    /* Progress row */
    .progress-row {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 24px;
    }
    .progress-count {
      font-size: 0.82rem; font-weight: 600; color: var(--muted);
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 4px 12px;
      box-shadow: var(--shadow-sm);
    }
    .muted { color: var(--muted); }

    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 22px;
      margin-bottom: 12px;
      box-shadow: var(--shadow);
    }
    .tips { color: var(--text2); font-size: 0.9rem; line-height: 2; }

    /* Buttons */
    .btn {
      display: block; width: 100%;
      padding: 16px 20px;
      border: none; border-radius: var(--r);
      font-size: 1rem; font-weight: 700;
      cursor: pointer;
      margin-bottom: 10px;
      transition: transform .12s, box-shadow .12s;
      text-align: center;
      letter-spacing: -.01em;
    }
    .btn:last-child { margin-bottom: 0; }
    .btn:active   { transform: scale(0.96); }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn-green  {
      background: linear-gradient(135deg, #6d5ff6, #9b7cf8);
      color: white;
      box-shadow: 0 4px 20px rgba(109,95,246,.35), 0 1px 3px rgba(109,95,246,.2);
    }
    .btn-green:active  { box-shadow: 0 2px 8px rgba(109,95,246,.25); }
    .btn-blue   {
      background: linear-gradient(135deg, #6d5ff6, #9b7cf8);
      color: white;
      box-shadow: 0 4px 20px rgba(109,95,246,.35), 0 1px 3px rgba(109,95,246,.2);
    }
    .btn-blue:active   { box-shadow: 0 2px 8px rgba(109,95,246,.25); }
    .btn-orange {
      background: var(--surface);
      color: var(--text);
      border: 1.5px solid var(--border);
      box-shadow: var(--shadow-sm);
    }
    .btn-ghost  {
      background: transparent;
      color: var(--muted);
      border: 1.5px solid var(--border);
    }
    .btn-sm { padding: 10px 14px; font-size: 0.88rem; }

    /* Set progress dots */
    .set-dots { display: flex; gap: 8px; margin-bottom: 20px; }
    .sd { flex: 1; height: 8px; border-radius: 4px; background: var(--border); transition: background .25s; }
    .sd-active { background: var(--violet); }
    .sd-done   { background: var(--teal); }

    /* Previous sets list */
    .prev-sets {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 4px 16px;
      margin-bottom: 12px;
      box-shadow: var(--shadow-sm);
    }
    .set-row {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.9rem;
    }
    .set-row:last-child { border-bottom: none; }
    .set-num { color: var(--muted); min-width: 56px; font-size: 0.82rem; font-weight: 600; }
    .set-value { font-weight: 600; color: var(--text); }
    .badge { padding: 3px 10px; border-radius: 20px; font-size: 0.78rem; font-weight: 600; white-space: nowrap; }
    .badge-ok   { background: var(--teal-light); color: var(--teal); }
    .badge-hard { background: var(--rose-light); color: var(--rose); }

    /* Form */
    .set-title {
      font-size: 0.78rem; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: .08em;
      margin-bottom: 18px;
    }
    .field { margin-bottom: 18px; }
    label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text2); margin-bottom: 8px; }
    input[type="number"] {
      width: 100%;
      padding: 15px 18px;
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-size: 1.2rem;
      font-weight: 600;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    input[type="number"]:focus {
      border-color: var(--violet);
      box-shadow: 0 0 0 3px rgba(109,95,246,.12);
    }
    .hint { font-size: 0.78rem; color: var(--muted); margin-top: 7px; font-weight: 500; }

    .toggle-row { display: flex; gap: 10px; }
    .t-btn {
      flex: 1; padding: 14px 8px;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      background: var(--surface2);
      color: var(--muted);
      font-size: 0.92rem; font-weight: 700;
      cursor: pointer;
      transition: all .12s;
    }
    .t-btn:active { transform: scale(0.96); }
    .t-ok   { border-color: var(--teal); background: var(--teal-light); color: var(--teal); }
    .t-hard { border-color: var(--rose); background: var(--rose-light); color: var(--rose); }

    .err {
      color: var(--rose); font-size: 0.85rem; font-weight: 500;
      margin-bottom: 14px; display: none;
      padding: 10px 14px;
      background: var(--rose-light);
      border-radius: 10px;
    }

    /* Stats */
    .stats-row { display: flex; gap: 10px; margin-bottom: 20px; }
    .stat {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px 8px;
      text-align: center;
      box-shadow: var(--shadow-sm);
    }
    .sv { display: block; font-size: 1.8rem; font-weight: 800; color: var(--text); letter-spacing: -.02em; }
    .sl { font-size: 0.72rem; font-weight: 600; color: var(--muted); margin-top: 3px; text-transform: uppercase; letter-spacing: .05em; }

    /* Done summary */
    .done-row {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 11px 0; border-bottom: 1px solid var(--border);
    }
    .done-row:last-child { border-bottom: none; }
    .icon-done { color: var(--teal); margin-top: 2px; font-weight: 700; }
    .icon-skip { color: var(--muted); margin-top: 2px; }
    .done-name { font-weight: 600; font-size: 0.95rem; }
    .small { font-size: 0.8rem; color: var(--muted); margin-top: 3px; font-weight: 500; }

    /* Propose tag */
    .propose-tag {
      display: inline-block;
      font-size: 0.7rem; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--violet); background: var(--violet-light);
      border-radius: 8px; padding: 5px 12px; margin-bottom: 16px;
    }

    /* Rest timer */
    .rest-bar {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 14px 20px; margin-bottom: 12px;
      box-shadow: var(--shadow-sm);
    }
    .rest-label { color: var(--muted); font-size: 0.85rem; font-weight: 600; }
    .rest-value { font-size: 1.6rem; font-weight: 800; color: var(--violet); transition: color .3s; letter-spacing: -.02em; }

    /* ── Animations ─────────────────────────────────────────── */
    @keyframes dotPop {
      0%   { transform: scale(0.3); }
      55%  { transform: scale(1.6); }
      78%  { transform: scale(0.88); }
      100% { transform: scale(1); }
    }
    @keyframes rowIn {
      from { opacity: 0; transform: translateX(-10px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes badgeBounce {
      0%   { transform: scale(0); opacity: 0; }
      65%  { transform: scale(1.2); opacity: 1; }
      100% { transform: scale(1); }
    }
    @keyframes popIn {
      0%   { transform: scale(0.5); opacity: 0; }
      70%  { transform: scale(1.06); opacity: 1; }
      100% { transform: scale(1); }
    }
    @keyframes flashOverlay {
      0%, 55% { opacity: 1; }
      100%    { opacity: 0; }
    }
    @keyframes confettiFall {
      to { transform: translateY(110vh) rotate(var(--cr, 360deg)); opacity: 0; }
    }
    @keyframes goBounce {
      0%   { transform: scale(0.5); opacity: 0; }
      65%  { transform: scale(1.35); opacity: 1; }
      100% { transform: scale(1); }
    }

    .sd-pop    { animation: dotPop 0.48s cubic-bezier(.36,.07,.19,.97) both; }
    .row-new   { animation: rowIn 0.28s ease-out both; }
    .badge-new { animation: badgeBounce 0.38s ease-out both; }
    .card-active {
      border-color: var(--violet);
      box-shadow: 0 0 0 3px var(--violet-light), var(--shadow-lg);
    }

    /* Dashboard */
    .dash-header { display: flex; align-items: center; gap: 14px; margin-bottom: 28px; }
    .btn-back {
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text); border-radius: 12px;
      width: 42px; height: 42px; flex-shrink: 0;
      cursor: pointer; font-size: 1.1rem;
      display: flex; align-items: center; justify-content: center;
      box-shadow: var(--shadow-sm);
      transition: transform .12s;
    }
    .btn-back:active { transform: scale(0.92); }
    .ex-title { font-weight: 700; font-size: 0.95rem; margin-bottom: 10px; color: var(--text); }
    .ex-sub { font-size: 0.78rem; color: var(--muted); font-weight: 500; }
    .hist-row {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 0.82rem;
    }
    .hist-row:last-child { border-bottom: none; padding-bottom: 0; }
    .hist-date    { color: var(--muted); min-width: 58px; flex-shrink: 0; font-weight: 500; }
    .hist-weights { flex: 1; font-weight: 600; color: var(--text); }
    .hist-comfort { font-size: 0.72rem; letter-spacing: 1px; flex-shrink: 0; }
    .session-row {
      display: flex; gap: 8px; align-items: center;
      padding: 9px 0; border-bottom: 1px solid var(--border); font-size: 0.88rem;
    }
    .session-row:last-child { border-bottom: none; }
    .session-date { color: var(--muted); min-width: 72px; flex-shrink: 0; font-weight: 500; }
    .btn-row { display: flex; gap: 10px; margin-top: 8px; }
    .btn-row .btn { flex: 1; margin-bottom: 0; }
    .empty-state { text-align: center; padding: 48px 0; color: var(--muted); font-size: 0.9rem; line-height: 1.7; }
  </style>
</head>
<body>
<div id="app"></div>
<script>
// ── DATA ──────────────────────────────────────────────────────────────────────

const EXERCISES = [
  { id: 'tirage-h',   name: 'Tirage horizontal', type: 'normal', reps: 20 },
  { id: 'tirage-v',   name: 'Tirage vertical',   type: 'normal', reps: 20 },
  { id: 'dev-nuque',  name: 'Développé nuque',   type: 'normal', reps: 20 },
  { id: 'ext-poulie', name: 'Extension poulie',  type: 'normal', reps: 20 },
  { id: 'dev-couche', name: 'Développé couché',  type: 'normal', reps: 20 },
  { id: 'squash',     name: 'Squash multipower', type: 'normal', reps: 20 },
  { id: 'traineau',   name: 'Traîneau',          type: 'normal', sets: 3, repsLabel: 'aller-retour' },
  { id: 'biceps',     name: 'Biceps barre',      type: 'normal', reps: 20 },
  { id: 'crunch',     name: 'Crunch abdos',      type: 'max' },
  { id: 'battements', name: 'Battements abdos',  type: 'max' },
];

const SETS = 4;
const STORAGE_KEY = 'muscu_sessions';

// ── STORAGE ───────────────────────────────────────────────────────────────────

function loadSessions() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
  catch { return []; }
}

function saveCurrentSession() {
  const sessions = loadSessions();
  sessions.push({
    date: new Date().toISOString(),
    duration: state.sessionStart ? Math.round((Date.now() - state.sessionStart) / 1000) : null,
    exercises: state.done.map(d => ({
      id: d.id,
      name: ex(d.id).name,
      type: ex(d.id).type,
      sets: d.sets,
    })),
    skipped: [...state.skipped],
  });
  localStorage.setItem(STORAGE_KEY, JSON.stringify(sessions));
}

function getLastExerciseData(exerciseId) {
  const sessions = loadSessions();
  for (let i = sessions.length - 1; i >= 0; i--) {
    const found = sessions[i].exercises.find(e => e.id === exerciseId);
    if (found) return found;
  }
  return null;
}

function exportData() {
  const data = localStorage.getItem(STORAGE_KEY) || '[]';
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `muscu_${new Date().toISOString().split('T')[0]}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importData() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json,application/json';
  input.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        if (!Array.isArray(data)) throw new Error();
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        render();
      } catch {
        alert('Fichier invalide ou corrompu.');
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

// ── STATE ─────────────────────────────────────────────────────────────────────

const state = {
  phase: 'warmup',   // warmup | proposing | exercising | stretching | done | dashboard
  pending: EXERCISES.map(e => e.id),
  done: [],          // [{id, sets: [{weight?, reps?, uncomfortable}]}]
  skipped: [],
  currentId: null,
  currentSets: [],
  comfort: null,
  sessionStart: null,
  prevPhase: 'warmup',
  restTimer: null,   // { endTime, intervalId } | null
  lastSetValue: null, // weight or reps entered in the previous set of the current exercise
};

const ex = id => EXERCISES.find(e => e.id === id);

// ── LOGIC ─────────────────────────────────────────────────────────────────────

function pickRandom(exclude) {
  const pool = state.pending.filter(id => id !== exclude);
  return pool.length ? pool[Math.floor(Math.random() * pool.length)] : null;
}

function propose(excludeId = null) {
  clearRestTimer();
  const id = pickRandom(excludeId);
  if (id === null) {
    if (state.pending.length > 0 && excludeId && state.pending.includes(excludeId)) {
      state.currentId = excludeId; // forced: only this station available
    } else {
      state.phase = 'stretching';
      render(); return;
    }
  } else {
    state.currentId = id;
  }
  state.currentSets = [];
  state.comfort = null;
  state.lastSetValue = null;
  state.phase = 'proposing';
  render();
}

function startExercises() {
  state.sessionStart = Date.now();
  if (!state.pending.length) { state.phase = 'stretching'; render(); return; }
  propose();
}

function acceptExercise() {
  state.phase = 'exercising';
  render();
}

function stationOccupied() {
  propose(state.currentId);
}

function skipExercise() {
  state.skipped.push(state.currentId);
  state.pending = state.pending.filter(id => id !== state.currentId);
  if (!state.pending.length) { state.phase = 'stretching'; render(); return; }
  propose();
}

function setComfort(value) {
  state.comfort = value;
  // targeted DOM update — no re-render to preserve input values
  document.querySelectorAll('.t-btn').forEach(btn => {
    btn.className = 't-btn';
    if (btn.dataset.v === 'ok'   && value === 'ok')   btn.classList.add('t-ok');
    if (btn.dataset.v === 'hard' && value === 'hard') btn.classList.add('t-hard');
  });
  const err = document.getElementById('err-msg');
  if (err) err.style.display = 'none';
}

function validateSet() {
  clearRestTimer();
  const e = ex(state.currentId);
  if (!state.comfort) { showError('Sélectionne un ressenti avant de valider.'); return; }

  const setData = { uncomfortable: state.comfort === 'hard' };

  if (e.type === 'max') {
    const v = parseInt(document.getElementById('reps-inp').value, 10);
    if (!v || v <= 0) { showError('Indique le nombre de répétitions.'); return; }
    setData.reps = v;
  } else {
    const v = parseFloat(document.getElementById('weight-inp').value);
    if (isNaN(v) || v < 0) { showError('Indique le poids utilisé (0 si sans charge).'); return; }
    setData.weight = v;
  }

  state.lastSetValue = e.type === 'max' ? setData.reps : setData.weight;
  state.currentSets.push(setData);
  const total = e.type === 'max' ? 1 : (e.sets ?? SETS);

  if (state.currentSets.length >= total) {
    const doneName = e.name;
    state.done.push({ id: state.currentId, sets: [...state.currentSets] });
    state.pending = state.pending.filter(id => id !== state.currentId);
    showExerciseDone(doneName);
    if (!state.pending.length) { state.phase = 'stretching'; render(); return; }
    propose();
  } else {
    state.comfort = null;
    // Set up rest timer state before render so the element is included in the DOM
    state.restTimer = { endTime: Date.now() + 30000, intervalId: null };
    render();
    startRestTimerInterval();
  }
}

function clearRestTimer() {
  if (state.restTimer?.intervalId) clearInterval(state.restTimer.intervalId);
  state.restTimer = null;
}

function startRestTimerInterval() {
  if (!state.restTimer) return;
  const { endTime } = state.restTimer;

  const tick = () => {
    const el = document.getElementById('rest-timer');
    if (!el) { clearRestTimer(); return; }
    const remaining = Math.ceil((endTime - Date.now()) / 1000);
    if (remaining <= 0) {
      clearRestTimer();
      el.textContent = '✓ Go !';
      el.style.color = 'var(--teal)';
      el.style.fontSize = '1.05rem';
      el.style.animation = 'goBounce .5s cubic-bezier(.36,.07,.19,.97) both';
      playBeep();
    } else {
      el.textContent = `${remaining}s`;
      el.style.color = remaining <= 5 ? 'var(--rose)' : remaining <= 10 ? 'var(--teal)' : 'var(--violet)';
    }
  };

  tick();
  state.restTimer.intervalId = setInterval(tick, 250);
}

function playBeep() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.frequency.value = 880;
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.4);
  } catch (_) {}
}

function showExerciseDone(name) {
  const el = document.createElement('div');
  el.style.cssText = `position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
    background:rgba(11,11,16,.78);backdrop-filter:blur(8px);z-index:200;pointer-events:none;
    animation:flashOverlay 1.15s ease-out forwards`;
  el.innerHTML = `<div style="text-align:center;animation:popIn .38s cubic-bezier(.36,.07,.19,.97) both">
    <div style="font-size:3rem;margin-bottom:10px">💪</div>
    <div style="font-size:1.5rem;font-weight:700;color:#f1f5f9;line-height:1.2">${name}</div>
    <div style="margin-top:8px;font-size:.82rem;letter-spacing:.1em;color:var(--teal);font-weight:600">TERMINÉ</div>
  </div>`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1250);
}

function launchConfetti() {
  const colors = ['#8b80f9','#5eead4','#fbbf24','#f87171','#b17cf8','#86efac','#ffffff'];
  const wrap = document.createElement('div');
  wrap.style.cssText = 'position:fixed;inset:0;pointer-events:none;z-index:201;overflow:hidden';
  for (let i = 0; i < 72; i++) {
    const p = document.createElement('div');
    const size = 5 + Math.random() * 9;
    p.style.cssText = `position:absolute;left:${Math.random()*100}%;top:-16px;
      width:${size}px;height:${size}px;background:${colors[i % colors.length]};
      border-radius:${Math.random() > .4 ? '50%' : '3px'};
      --cr:${(Math.random()-.5)*720}deg;
      animation:confettiFall ${1.2+Math.random()*1.2}s ${Math.random()*.7}s ease-in forwards`;
    wrap.appendChild(p);
  }
  document.body.appendChild(wrap);
  setTimeout(() => wrap.remove(), 2600);
}

function showError(msg) {
  const el = document.getElementById('err-msg');
  if (el) { el.textContent = msg; el.style.display = 'block'; }
}

function finishStretching() {
  saveCurrentSession();
  state.phase = 'done';
  render();
  launchConfetti();
}

function showDashboard() {
  state.prevPhase = state.phase;
  state.phase = 'dashboard';
  render();
}

function backFromDashboard() {
  state.phase = state.prevPhase || 'warmup';
  render();
}

function resetSession() {
  Object.assign(state, {
    phase: 'warmup',
    pending: EXERCISES.map(e => e.id),
    done: [], skipped: [],
    currentId: null, currentSets: [], comfort: null,
    sessionStart: null,
  });
  render();
}

// ── HELPERS ───────────────────────────────────────────────────────────────────

function formatDate(iso) {
  return new Date(iso).toLocaleDateString('fr-FR', { day: 'numeric', month: 'short' });
}

function formatDuration(seconds) {
  if (!seconds) return '';
  const h = Math.floor(seconds / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  return h > 0 ? `${h}h${String(m).padStart(2, '0')}` : `${m} min`;
}

function getExerciseHistory(exerciseId, count = 5) {
  const sessions = loadSessions();
  return sessions
    .filter(s => s.exercises.some(e => e.id === exerciseId))
    .slice(-count)
    .reverse()
    .map(s => ({ date: s.date, data: s.exercises.find(e => e.id === exerciseId) }));
}

// ── RENDER ────────────────────────────────────────────────────────────────────

function phaseDots(phase) {
  const idx = { warmup: 0, proposing: 1, exercising: 1, stretching: 2, done: 3 }[phase];
  return `<div class="phase-bar">${[0, 1, 2].map(i =>
    `<div class="pd ${i < idx ? 'pd-done' : i === idx ? 'pd-active' : ''}"></div>`
  ).join('')}</div>`;
}

function renderWarmup() {
  const sessions = loadSessions();
  const lastDate = sessions.length ? formatDate(sessions[sessions.length - 1].date) : null;
  return `
    ${phaseDots('warmup')}
    <div class="big-emoji">🔥</div>
    <h1>Échauffement</h1>
    <p class="sub">Prépare ton corps avant de commencer les exercices.</p>
    <div class="card">
      <p class="tips">• 5 min cardio léger<br>• Rotations articulaires<br>• Mobilité dynamique</p>
    </div>
    <button class="btn btn-green" onclick="startExercises()">C'est fait — Commencer les exercices !</button>
    <button class="btn btn-ghost" onclick="showDashboard()">
      📊 Historique${lastDate ? ` · dernière séance le ${lastDate}` : ''}
    </button>
  `;
}

function renderProposing() {
  const e = ex(state.currentId);
  const hasAlt = state.pending.filter(id => id !== state.currentId).length > 0;
  const doneCount = state.done.length;
  const totalToDo = EXERCISES.length - state.skipped.length;

  return `
    ${phaseDots('proposing')}
    <div class="progress-row">
      <span class="progress-count">${doneCount} / ${totalToDo} exercices</span>
      <span class="progress-count">${state.pending.length} restant${state.pending.length > 1 ? 's' : ''}</span>
    </div>
    <p class="propose-tag">Exercice suivant</p>
    <h1>${e.name}</h1>
    <p class="sub">${e.type === 'max' ? '1 série · Maximum de répétitions' : `${e.sets ?? SETS} séries × ${e.repsLabel ?? `${e.reps} répétitions`}`}</p>
    <button class="btn btn-green" onclick="acceptExercise()">Commencer</button>
    <button class="btn btn-orange" onclick="stationOccupied()" ${!hasAlt ? 'disabled' : ''}>
      Station occupée — autre exercice
    </button>
    <button class="btn btn-ghost" onclick="skipExercise()">Ignorer aujourd'hui</button>
  `;
}

function renderExercising() {
  const e = ex(state.currentId);
  const total = e.type === 'max' ? 1 : (e.sets ?? SETS);
  const done = state.currentSets.length;

  // Pre-fill: current session's previous set takes priority over last session's data
  const lastData = getLastExerciseData(state.currentId);
  const lastSet = lastData?.sets?.[done];
  const lastWeight = state.lastSetValue ?? lastSet?.weight ?? null;
  const lastReps   = state.lastSetValue ?? lastSet?.reps   ?? null;

  const dots = e.type === 'normal' ? `
    <div class="set-dots">
      ${Array.from({ length: total }, (_, i) =>
        `<div class="sd ${i < done ? 'sd-done' : i === done ? 'sd-active' : ''} ${i === done - 1 ? 'sd-pop' : ''}"></div>`
      ).join('')}
    </div>` : '';

  const prevSets = done > 0 ? `
    <div class="prev-sets">
      ${state.currentSets.map((s, i) => `
        <div class="set-row ${i === done - 1 ? 'row-new' : ''}">
          <span class="set-num">Série ${i + 1}</span>
          <span class="set-value">${e.type === 'max' ? `${s.reps} reps` : `${s.weight} kg`}</span>
          <span class="badge ${s.uncomfortable ? 'badge-hard' : 'badge-ok'} ${i === done - 1 ? 'badge-new' : ''}">
            ${s.uncomfortable ? '😤 Difficile' : '✓ OK'}
          </span>
        </div>`).join('')}
    </div>` : '';

  const inputHtml = e.type === 'max' ? `
    <div class="field">
      <label>Répétitions effectuées</label>
      <input id="reps-inp" type="number" inputmode="numeric" min="1"
             placeholder="ex : 45" ${lastReps != null ? `value="${lastReps}"` : ''} autofocus>
      ${lastReps != null ? `<p class="hint">Dernière fois : ${lastReps} reps</p>` : ''}
    </div>` : `
    <div class="field">
      <label>Poids utilisé (kg)</label>
      <input id="weight-inp" type="number" inputmode="decimal" min="0" step="0.5"
             placeholder="ex : 40" ${lastWeight != null ? `value="${lastWeight}"` : ''} autofocus>
      ${lastWeight != null ? `<p class="hint">Dernière fois : ${lastWeight} kg</p>` : ''}
    </div>`;

  const isLast = done + 1 >= total;
  const btnLabel = e.type === 'max'
    ? 'Terminer l\'exercice ✓'
    : (isLast ? 'Terminer l\'exercice ✓' : `Valider la série ${done + 1} →`);

  const initialRemaining = state.restTimer
    ? Math.max(0, Math.ceil((state.restTimer.endTime - Date.now()) / 1000))
    : null;
  const restHtml = initialRemaining !== null ? `
    <div class="rest-bar">
      <span class="rest-label">⏱ Repos</span>
      <span id="rest-timer" class="rest-value">${initialRemaining > 0 ? `${initialRemaining}s` : '✓ Go !'}</span>
    </div>` : '';

  return `
    ${phaseDots('exercising')}
    <h1>${e.name}</h1>
    <p class="sub" style="margin-bottom:16px">${e.type === 'max' ? 'Maximum de répétitions' : `${e.sets ?? SETS} séries × ${e.repsLabel ?? `${e.reps} reps`}`}</p>
    ${dots}
    ${prevSets}
    ${restHtml}
    <div class="card card-active">
      <p class="set-title">${e.type === 'max' ? 'Série unique' : `Série ${done + 1} / ${total}`}</p>
      ${inputHtml}
      <div class="field">
        <label>Ressenti</label>
        <div class="toggle-row">
          <button class="t-btn ${state.comfort === 'ok'   ? 't-ok'   : ''}" data-v="ok"   onclick="setComfort('ok')">✓ Confortable</button>
          <button class="t-btn ${state.comfort === 'hard' ? 't-hard' : ''}" data-v="hard" onclick="setComfort('hard')">😤 Difficile</button>
        </div>
      </div>
      <div id="err-msg" class="err"></div>
      <button class="btn btn-blue" onclick="validateSet()" style="margin-bottom:0">${btnLabel}</button>
    </div>

  `;
}

function renderStretching() {
  const totalSets = state.done.reduce((a, d) => a + d.sets.length, 0);
  const elapsed = state.sessionStart ? Math.round((Date.now() - state.sessionStart) / 1000) : null;
  return `
    ${phaseDots('stretching')}
    <div class="big-emoji">🧘</div>
    <h1>Étirements</h1>
    <p class="sub">Prends le temps d'étirer tous les groupes musculaires travaillés.</p>
    <div class="stats-row">
      <div class="stat"><span class="sv">${state.done.length}</span><span class="sl">exercices</span></div>
      <div class="stat"><span class="sv">${totalSets}</span><span class="sl">séries</span></div>
      ${elapsed ? `<div class="stat"><span class="sv">${formatDuration(elapsed)}</span><span class="sl">durée</span></div>` : ''}
    </div>
    <div class="card">
      <p class="tips">• Pectoraux & épaules<br>• Dos & dorsaux<br>• Biceps & triceps<br>• Abdominaux<br>• Jambes (si traîneau)</p>
    </div>
    <button class="btn btn-green" onclick="finishStretching()">Séance terminée ! 🎉</button>
  `;
}

function renderDone() {
  const totalSets = state.done.reduce((a, d) => a + d.sets.length, 0);
  const date = new Date().toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' });
  const elapsed = state.sessionStart ? Math.round((Date.now() - state.sessionStart) / 1000) : null;

  const rows = EXERCISES.map(e => {
    const d = state.done.find(x => x.id === e.id);
    const s = state.skipped.includes(e.id);
    if (!d && !s) return '';
    const detail = d
      ? d.sets.map(set => e.type === 'max' ? `${set.reps} reps` : `${set.weight} kg`).join(' · ')
      : '';
    return `
      <div class="done-row">
        <span class="${d ? 'icon-done' : 'icon-skip'}">${d ? '✓' : '−'}</span>
        <div>
          <div class="done-name" style="${s ? 'color:var(--muted)' : ''}">${e.name}</div>
          ${d ? `<div class="small">${detail}</div>` : ''}
        </div>
      </div>`;
  }).join('');

  return `
    <div class="big-emoji">🏆</div>
    <h1>Bravo !</h1>
    <p class="sub">${date.charAt(0).toUpperCase() + date.slice(1)}</p>
    <div class="stats-row">
      <div class="stat"><span class="sv">${state.done.length}</span><span class="sl">exercices</span></div>
      <div class="stat"><span class="sv">${totalSets}</span><span class="sl">séries</span></div>
      ${elapsed ? `<div class="stat"><span class="sv">${formatDuration(elapsed)}</span><span class="sl">durée</span></div>` : ''}
    </div>
    <div class="card">${rows}</div>
    <button class="btn btn-ghost" onclick="showDashboard()" style="margin-bottom:10px">📊 Voir l'historique</button>
    <button class="btn btn-blue" onclick="resetSession()">Nouvelle séance</button>
  `;
}

function renderDashboard() {
  const sessions = loadSessions();
  const totalSeries = sessions.reduce((a, s) => a + s.exercises.reduce((b, e) => b + e.sets.length, 0), 0);

  const recentSessions = sessions.slice(-5).reverse().map(s => {
    const exCount = s.exercises.length;
    const sets = s.exercises.reduce((a, e) => a + e.sets.length, 0);
    const dur = s.duration ? ` · ${formatDuration(s.duration)}` : '';
    return `
      <div class="session-row">
        <span class="session-date">${formatDate(s.date)}</span>
        <span class="muted">${exCount} exercices · ${sets} séries${dur}</span>
      </div>`;
  }).join('');

  const exerciseCards = EXERCISES.map(e => {
    const history = getExerciseHistory(e.id);
    if (!history.length) return '';

    const rows = history.map(h => {
      const weightsStr = e.type === 'max'
        ? `${h.data.sets[0].reps} reps`
        : h.data.sets.map(s => s.weight).join(' / ') + ' kg';
      const comfort = h.data.sets.map(s => s.uncomfortable ? '😤' : '✓').join('');
      return `
        <div class="hist-row">
          <span class="hist-date">${formatDate(h.date)}</span>
          <span class="hist-weights">${weightsStr}</span>
          <span class="hist-comfort">${comfort}</span>
        </div>`;
    }).join('');

    return `
      <div class="card">
        <p class="ex-title">${e.name} <span class="ex-sub">${e.type === 'max' ? 'max reps' : `${e.sets ?? SETS} × ${e.repsLabel ?? e.reps}`}</span></p>
        ${rows}
      </div>`;
  }).join('');

  const isEmpty = !sessions.length;

  return `
    <div class="dash-header">
      <button class="btn-back" onclick="backFromDashboard()">←</button>
      <h1 style="margin-bottom:0">Historique</h1>
    </div>

    <div class="stats-row">
      <div class="stat"><span class="sv">${sessions.length}</span><span class="sl">séances</span></div>
      <div class="stat"><span class="sv">${totalSeries}</span><span class="sl">séries totales</span></div>
    </div>

    ${isEmpty
      ? '<p class="empty-state">Aucune séance enregistrée.<br>Complète ta première séance pour voir l\'historique.</p>'
      : `<div class="card"><h2>Dernières séances</h2>${recentSessions}</div>${exerciseCards}`
    }

    <div class="btn-row">
      <button class="btn btn-ghost btn-sm" onclick="exportData()">⬇ Exporter JSON</button>
      <button class="btn btn-ghost btn-sm" onclick="importData()">⬆ Importer JSON</button>
    </div>
  `;
}

function render() {
  const app = document.getElementById('app');
  app.innerHTML = {
    warmup:     renderWarmup,
    proposing:  renderProposing,
    exercising: renderExercising,
    stretching: renderStretching,
    done:       renderDone,
    dashboard:  renderDashboard,
  }[state.phase]();
  app.animate(
    [{ opacity: 0, transform: 'translateY(10px)' }, { opacity: 1, transform: 'translateY(0)' }],
    { duration: 220, easing: 'ease-out', fill: 'both' }
  );
}

render();
</script>
</body>
</html>
